version: '3.8'

services:
  database:
    image: mongo:latest
    container_name: diabeguide-db
    network_mode: host
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: diabeguide-backend
    network_mode: host
    environment:
      - PORT=5000
      - MONGODB_URI=mongodb://127.0.0.1:27017/diabeguide
      - JWT_SECRET=super_secret_key_for_diabeguide_jwt
      - CHATBOT_PROVIDER=ollama
      - OLLAMA_URL=http://127.0.0.1:11434
      - OLLAMA_MODEL=gemma2:2b
      - RESEND_API_KEY=re_Cwmw2n2X_M1bCGvXUt1mPpoxkKi1jjiiT
      - SMTP_SERVER=smtp.gmail.com
      - SMTP_PORT=465
      - SMTP_USERNAME=aarav1mathur@gmail.com
      - SMTP_PASSWORD=xnjbiqokmbhekbtx
    depends_on:
      - database
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: diabeguide-frontend
    network_mode: host
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mongodb_data:
