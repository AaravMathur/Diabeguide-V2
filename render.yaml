services:
  - type: web
    name: diabeguide-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: node dist/server.js
    envVars:
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: MONGODB_URI
        sync: false
        placeholder: "Your MongoDB Atlas connection URI"
      - key: RESEND_API_KEY
        sync: false
        value: "re_Cwmw2n2X_M1bCGvXUt1mPpoxkKi1jjiiT"
      - key: SMTP_SERVER
        value: "smtp.gmail.com"
      - key: SMTP_PORT
        value: "465"
      - key: SMTP_USERNAME
        sync: false
        value: "aarav1mathur@gmail.com"
      - key: SMTP_PASSWORD
        sync: false
        value: "xnjbiqokmbhekbtx"
      - key: CHATBOT_PROVIDER
        value: "gemini"
      - key: GEMINI_API_KEY
        sync: false
        placeholder: "Optional: Your Gemini API Key for production chatbot use"
